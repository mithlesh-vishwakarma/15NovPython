<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session 3 Assignments - Flipkart & Zomato Forms</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Session 3: HTML Forms & Validation</h1>

    <div class="form-container">
        
        <div class="form-card flipkart-card">
            <h2>Flipkart Product Review</h2>
            
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="review-username">Username:</label>
                    <input type="text" id="review-username" name="username" required placeholder="Enter username">
                </div>

                <div class="form-group">
                    <label for="review-rating">Rating:</label>
                    <select id="review-rating" name="rating" required>
                        <option value="" disabled selected>Choose a rating</option>
                        <option value="5">5 Star</option>
                        <option value="4">4 Star</option>
                        <option value="3">3 Star</option>
                        <option value="2">2 Star</option>
                        <option value="1">1 Star</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="review-message">Review Message:</label>
                    <textarea id="review-message" name="message" minlength="20" required placeholder="Write review (min 20 characters)"></textarea>
                </div>

                <button type="submit">Submit Review</button>
            </form>
        </div>

        <div class="form-card zomato-card">
            <h2>Zomato Food Order</h2>
            
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="order-id">Order ID:</label>
                    <input type="text" id="order-id" name="order_id" value="ORD12345" disabled>
                    <!-- Explaining why this field is disabled for users:
                         The Order ID is generated automatically by the backend system. 
                         It is disabled so users cannot edit it, preventing database errors and tampering. -->
                    <p class="explanation">Note: Order ID is generated by system and cannot be edited.</p>
                </div>

                <div class="form-group">
                    <label for="order-username">User Name:</label>
                    <input type="text" id="order-username" name="user_name" required placeholder="Enter your name">
                </div>

                <div class="form-group">
                    <label for="order-food">Select Food Item:</label>
                    <select id="order-food" name="food_item" required>
                        <option value="" disabled selected>Choose a dish</option>
                        <option value="pizza">Cheese Pizza</option>
                        <option value="burger">Chicken Burger</option>
                        <option value="pasta">White Sauce Pasta</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="order-quantity">Quantity:</label>
                    <input type="number" id="order-quantity" name="quantity" min="1" required placeholder="Enter quantity">
                </div>

                <div class="form-group">
                    <label for="order-instructions">Delivery Instructions:</label>
                    <textarea id="order-instructions" name="instructions" required placeholder="Enter instructions"></textarea>
                </div>

                <button type="submit">Place Order</button>
            </form>
        </div>

    </div>

</body>
</html>
