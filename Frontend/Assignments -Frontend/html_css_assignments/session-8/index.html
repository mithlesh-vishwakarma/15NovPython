<!DOCTYPE html>

<body>

    <div class="card-container">
        <div class="product-card">
            <div class="product-image-container">
                <img class="product-image" src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500&auto=format&fit=crop&q=80" alt="Sony Headphones">
            </div>
            <div class="product-details">
                <span class="brand-name">SONY</span>
                <h2 class="product-title">Sony WH-1000XM4 Noise Cancelling Wireless Headphones</h2>

                    <span class="rating-badge">4.6 ★</span>
                    <span class="reviews-count">2,453 Ratings & 352 Reviews</span>
                </div>
                <div class="price-section">
                    <span class="price">₹19,990</span>
                    <span class="mrp">₹29,990</span>
                    <span class="discount">33% off</span>
                </div>
                <ul class="offers">
                    <li>Bank Offer: 10% Instant Discount on SBI Credit Cards.</li>
                    <li>Partner Offer: Get Google Nest Hub at ₹4,999.</li>
                    <li>No Cost EMI: From ₹3,332/month.</li>
                </ul>
            </div>
        </div>
    </div>
