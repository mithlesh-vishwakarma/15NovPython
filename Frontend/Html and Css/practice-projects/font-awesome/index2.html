<!DOCTYPE html>
<html>
<head>
    <title>Icon Library</title>
    <link rel="stylesheet" href="style2.css">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

<div class="heading">

    <p>THE LIBRARY</p>

    <h1>Thousands of icons. Make them your own.</h1>

</div>


<div class="wrapper">

    <!-- Left Menu -->

    <div class="sidebar">

        <button class="active">CLASSIC</button>

        <button>DUOTONE</button>

        <button>SHARP</button>

        <button>CHISEL</button>

        <button>GRAPHITE</button>

        <button>JELLY</button>

        <button>MOSAIC</button>

        <button>PIXEL</button>

    </div>


    <!-- Right -->

    <div class="content">

        <!-- Search -->

        <div class="search">

            <i class="fa-solid fa-magnifying-glass"></i>

            <input type="text"
            placeholder="Search Classic icons...">

        </div>


        <!-- Top -->

        <div class="top">

            <h2>CLASSIC</h2>

            <a href="#">Explore →</a>

        </div>


        <!-- Icons -->

        <div class="icons">

            <div><i class="fa-solid fa-user"></i></div>
            <div><i class="fa-solid fa-house"></i></div>
            <div><i class="fa-solid fa-heart"></i></div>
            <div><i class="fa-solid fa-camera"></i></div>
            <div><i class="fa-solid fa-music"></i></div>
            <div><i class="fa-solid fa-car"></i></div>
            <div><i class="fa-solid fa-star"></i></div>
            <div><i class="fa-solid fa-bell"></i></div>
            <div><i class="fa-solid fa-phone"></i></div>
            <div><i class="fa-solid fa-book"></i></div>
            <div><i class="fa-solid fa-cart-shopping"></i></div>
            <div><i class="fa-solid fa-cloud"></i></div>
            <div><i class="fa-solid fa-plane"></i></div>
            <div><i class="fa-solid fa-gift"></i></div>
            <div><i class="fa-solid fa-anchor"></i></div>
            <div><i class="fa-solid fa-bolt"></i></div>
            <div><i class="fa-solid fa-bed"></i></div>
            <div><i class="fa-solid fa-gear"></i></div>
            <div><i class="fa-solid fa-truck"></i></div>
            <div><i class="fa-solid fa-image"></i></div>
            <div><i class="fa-solid fa-envelope"></i></div>
            <div><i class="fa-solid fa-location-dot"></i></div>
            <div><i class="fa-solid fa-clock"></i></div>
            <div><i class="fa-solid fa-flag"></i></div>

        </div>


        <!-- Bottom -->

        <div class="footer">

            <button>Style</button>

            <button>Dark</button>

            <select>

                <option>No Animation</option>

                <option>Float</option>

                <option>Bounce</option>

            </select>

            <button>Reset</button>

        </div>

    </div>

</div>

</body>
</html>
