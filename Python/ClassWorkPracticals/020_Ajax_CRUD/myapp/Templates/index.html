<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Form & Table</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />

    <style>
        body {
            background-color: #f5f7fa;
        }

        .card {
            border: none;
            border-radius: 12px;
        }

        .table-container {
            overflow-x: auto;
        }
    </style>
</head>

<body>

    <div class="container py-5">

        <div class="row g-4">

            <!-- LEFT SIDE FORM -->
            <div class="col-lg-4">

                <div class="card shadow p-4">

                    <h2 class="text-center mb-4">
                        Student Information Form
                    </h2>

                    <form>

                        <!-- Name -->
                        <div class="mb-3">
                            <label for="name" class="form-label">
                                Full Name
                            </label>

                            <input
                                type="text"
                                class="form-control"
                                id="name"
                                placeholder="Enter your full name"
                            />
                        </div>

                        <!-- Email -->
                        <div class="mb-3">
                            <label for="email" class="form-label">
                                Email Address
                            </label>

                            <input
                                type="email"
                                class="form-control"
                                id="email"
                                placeholder="Enter your email"
                            />
                        </div>

                        <!-- Phone -->
                        <div class="mb-3">
                            <label for="phone" class="form-label">
                                Phone Number
                            </label>

                            <input
                                type="tel"
                                class="form-control"
                                id="phone"
                                placeholder="Enter your phone number"
                            />
                        </div>

                        <!-- Age -->
                        <div class="mb-4">
                            <label for="age" class="form-label">
                                Age
                            </label>

                            <input
                                type="number"
                                class="form-control"
                                id="age"
                                placeholder="Enter your age"
                            />
                        </div>

                        <!-- Submit -->
                        <div class="d-grid">
                            <button
                                type="submit"
                                class="btn btn-primary"
                            >
                                Submit
                            </button>
                        </div>

                    </form>

                </div>

            </div>

            <!-- RIGHT SIDE TABLE -->
            <div class="col-lg-8">

                <div class="card shadow p-4">

                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h2 class="mb-0">
                            Student Records
                        </h2>
                    </div>

                    <div class="table-container">

                        <table class="table table-bordered table-hover align-middle">

                            <thead class="table-dark">

                                <tr>
                                    <th>#</th>
                                    <th>Name</th>
                                    <th>Email</th>
                                    <th>Phone</th>
                                    <th>Age</th>
                                </tr>

                            </thead>

                            <tbody>

                                <tr>
                                    <td>1</td>
                                    <td>Rahul Sharma</td>
                                    <td>rahul@gmail.com</td>
                                    <td>9876543210</td>
                                    <td>22</td>
                                </tr>

                                <tr>
                                    <td>2</td>
                                    <td>Priya Patel</td>
                                    <td>priya@gmail.com</td>
                                    <td>9876512345</td>
                                    <td>21</td>
                                </tr>

                                <tr>
                                    <td>3</td>
                                    <td>Aman Verma</td>
                                    <td>aman@gmail.com</td>
                                    <td>9988776655</td>
                                    <td>24</td>
                                </tr>

                                <tr>
                                    <td>4</td>
                                    <td>Neha Singh</td>
                                    <td>neha@gmail.com</td>
                                    <td>9123456780</td>
                                    <td>23</td>
                                </tr>

                            </tbody>

                        </table>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
