<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>form</title>
</head>
<body>

  <form action="" method="">
    <label for="">Username</label>
    <input type="text" name="uname" id="uname" placeholder="enter username">
    <label for="email">Email</label>
    <input type="email" name="email" id="email" placeholder="enter your email">
    <label for="password">Password</label>
    <input type="password" name="password" id="password" placeholder="enter your password">
    <br><br>
    <label for="">Gender</label>
    <input type="radio" name="gender" id="gender" value="male">Male
    <input type="radio" name="gender" id="gender" value="female">Female
    <input type="radio" name="gender" id="gender" value="other">Other
    <br><br>
    <label for="">Country</label>
    <input type="checkbox" name="country" id="country" value="india">India
    <input type="checkbox" name="country" id="country" value="pakistan">Pakistan
    <input type="checkbox" name="country" id="country" value="usa">USA
    <br><br>
    <select>
      <option value=""></option>
    </select>




  </form>
  
</body>
</html>
