<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JavaScript Calculator</title>
</head>
<body>

  <h1>Interactive Calculator</h1>
  
  <label for="input1">Number 1:</label>
  <input type="number" id="input1">
  <br><br>
  
  <label for="input2">Number 2:</label>
  <input type="number" id="input2">
  <br><br>
  
  <button onclick="sum()">Add</button>
  <button onclick="sub()">Sub</button>
  <button onclick="multi()">Multi</button>
  <button onclick="div()">Div</button>
  
  <br><br>
  <div id="result">Result: </div>

  <script>
    function sum() {
      var val1 = document.getElementById("input1").value;
      var val2 = document.getElementById("input2").value;
      
      // var num1 = parseFloat(val1);
      // var num2 = parseFloat(val2);
      var result = num1 + num2;
      
      document.getElementById("result").innerHTML = "Result: " + result;
    }

    function sub() {
      var val1 = document.getElementById("input1").value;
      var val2 = document.getElementById("input2").value;
      
      // var num1 = parseFloat(val1);
      // var num2 = parseFloat(val2);
      var result = num1 - num2;
      
      document.getElementById("result").innerHTML = "Result: " + result;
    }

    function multi() {
      var val1 = document.getElementById("input1").value;
      var val2 = document.getElementById("input2").value;
      
      // var num1 = parseFloat(val1);
      // var num2 = parseFloat(val2);
      var result = num1 * num2;
      
      document.getElementById("result").innerHTML = "Result: " + result;
    }

    function div() {
      var val1 = document.getElementById("input1").value;
      var val2 = document.getElementById("input2").value;
      
      // var num1 = parseFloat(val1);
      // var num2 = parseFloat(val2);
      
      if (val2 === 0) {
        document.getElementById("result").innerHTML = "Cannot divide by zero";
        return;
      }
      
      var result = val1 / val2;
      
      document.getElementById("result").innerHTML = "Result: " + result;
    }
  </script>

</body>
</html>
