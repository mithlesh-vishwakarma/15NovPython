<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Products</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f5f5;
        }

        .table-container {
            margin-top: 50px;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        table img {
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="table-container">

            <h2 class="text-center mb-4">Product List</h2>
            <a href="{%url 'index'%}" class="btn btn-success"> add new</a>
            <br>
            <table class="table table-bordered table-hover text-center align-middle">
                
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Product Name</th>
                        <th>Price</th>
                        <th>Quantity</th>
                        <th>Image</th>
                        <th colspan="2">Action</th>
                    </tr>
                </thead>

                <tbody>

                    <!-- Django Loop -->
                    {% for product in products %}

                    <tr>
                        <td>{{ product.id }}</td>
                        <td>{{ product.name }}</td>
                        <td>{{ product.price }}</td>
                        <td>{{ product.qty }}</td>

                        <td>
                            <img src="{{ product.image.url }}" alt="{{product.image}}" width="80" height="80">
                        </td>

                       <td>
                            <a href="{%url 'delete'%}?id={{product.id}}" class="btn btn-danger">DELETE</a>
                        </td>
                        <td>
                            <a href="{%url 'update'%}?id={{product.id}}" class="btn btn-primary">UPDATE</a>
                        </td>
                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>
    </div>

</body>

</html>
