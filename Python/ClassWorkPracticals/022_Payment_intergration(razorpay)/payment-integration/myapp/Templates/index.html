<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>payment integration</title>
    <script src="https://code.jquery.com/jquery-4.0.0.min.js" integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
</head>
<body>
<input type="text" id="amt" placeholder="Enter Amount">
<button id="rzp-button1">Pay with Razorpay</button>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>

document.getElementById('rzp-button1').onclick = function(e){
    e.preventDefault();
    var amt = document.getElementById('amt').value;

    $.get('payment', { amount: amt }, function(rt){
        console.log(rt);

        var options = {
            "key": "rzp_test_TDH7A8ecMTugCu", // Enter the Key ID generated from the Dashboard
            "amount": rt.amount, // Pass the dynamic amount obtained in the response
            "currency": "INR",
            "name": "OrdinaryCoder",
            "description": "Test Transaction",
            "image": "https://example.com/your_logo",
            "order_id": rt.id, // Pass the dynamic order ID obtained in the response
            "handler": function (response){
                alert(response.razorpay_payment_id);
                alert(response.razorpay_order_id);
                alert(response.razorpay_signature)
            },
            "prefill": {
                "name": "<name>",
                "email": "<email>",
                "contact": "<phone>"
            },
            "notes": {
                "address": "Razorpay Corporate Office"
            },
            "theme": {
                "color": "#3399cc"
            }
        };

        var rzp1 = new Razorpay(options);
        rzp1.on('payment.failed', function (response){
            alert(response.error.code);
            alert(response.error.description);
            alert(response.error.source);
            alert(response.error.step);
            alert(response.error.reason);
            alert(response.error.metadata.order_id);
            alert(response.error.metadata.payment_id);
        });
        rzp1.open();
    });
}

</script>
    
</body>
</html>
