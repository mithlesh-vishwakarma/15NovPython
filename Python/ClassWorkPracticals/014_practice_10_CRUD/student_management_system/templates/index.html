<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Student Registration Form</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: #f4f7fc;
        }

        .form-container{
            max-width: 700px;
            margin: 50px auto;
            background: white;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        .form-title{
            text-align: center;
            margin-bottom: 30px;
            font-weight: bold;
            color: #0d6efd;
        }

        .btn-custom{
            width: 100%;
            padding: 10px;
            font-size: 18px;
            border-radius: 10px;
        }

        label{
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="form-container">

            <h2 class="form-title">Student Registration Form</h2>

            <form method="POST" action="{%url 'add_student'%}">
              {% csrf_token %}

                <div class="row">

                    <!-- Name -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" placeholder="Enter full name" name="name">
                    </div>

                    <!-- Roll Number -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Roll Number</label>
                        <input type="number" class="form-control" placeholder="Enter roll number" name="rollnumber">
                    </div>
                    

                </div>

                <div class="row">
  <!-- Email -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" placeholder="Enter email" name="email">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Age</label>
                        <input type="text" class="form-control" placeholder="Enter Your Age" name="age">
                    </div>

                </div>

                <div class="row">

                    <!-- Phone -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Contact</label>
                        <input type="tel" class="form-control" placeholder="Enter phone number" name="contact">
                    </div>
                    <!-- Course -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Course</label>
                        <select class="form-select" name="course">
                            <option selected>Select Course</option>
                            <option>BCA</option>
                            <option>BBA</option>
                            <option>B.Tech</option>
                            <option>MCA</option>
                            <option>MBA</option>
                        </select>
                    </div>

                </div>
                
                <!-- Submit Button -->
                <div class="mt-4">
                    <button type="submit" class="btn btn-primary btn-custom">
                        Submit
                    </button>
                </div>
                <div class="mt-4">
                    <button class="btn btn-success" {%url 'display_data'%}>
                        View Student Data
                    </button>
                </div>

            </form>
            <span class="text-success">{{msg}}</span>

        </div>
    </div>

</body>
</html>
