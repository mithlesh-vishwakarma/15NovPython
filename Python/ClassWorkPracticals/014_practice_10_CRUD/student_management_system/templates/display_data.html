<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Records</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background-color: #f4f7fc;
      }

      .table-container {
        width: 95%;
        margin: 50px auto;
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0px 0px 20px rgba(0, 0, 0, 0.1);
      }

      .title {
        text-align: center;
        margin-bottom: 25px;
        color: #0d6efd;
        font-weight: bold;
      }

      table {
        text-align: center;
      }

      th {
        background-color: #0d6efd !important;
        color: white !important;
      }

      .btn-action {
        padding: 5px 12px;
        font-size: 14px;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <div class="table-container">
      <h2 class="title">Student Records</h2>

      <table class="table table-bordered table-hover align-middle">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Roll Number</th>
            <th>Email</th>
            <th>Age</th>
            <th>Contact</th>
            <th>Course</th>
            <th>Actions</th>
          </tr>
        </thead>

        <tbody>
          {% for st in student_data %}
          <tr>
            <td>{{st.id}}</td>
            <td>{{st.name}}</td>
            <td>{{st.rollnumber}}</td>
            <td>{{st.email}}</td>
            <td>{{st.age}}</td>
            <td>{{st.contact}}</td>
            <td>{{st.course}}</td>

            <td>
              <a href="#" class="btn btn-warning btn-action"> Edit </a>

              <a href="{% url 'delete_data'?id={st.id}%}" class="btn btn-danger btn-action">
    Delete
</a>
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </body>
</html>
