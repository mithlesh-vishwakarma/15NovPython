<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f7fa;
        }

        .form-card{
            max-width:700px;
            margin:50px auto;
            border:none;
            border-radius:15px;
            box-shadow:0 5px 20px rgba(0,0,0,0.1);
        }

        .card-header{
            background:#0d6efd;
            color:white;
            text-align:center;
            font-size:24px;
            font-weight:600;
            padding:20px;
            border-radius:15px 15px 0 0;
        }

        .btn-custom{
            min-width:150px;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="card form-card">

        <div class="card-header">
            Add New Product
        </div>

        <div class="card-body p-4">

            <form method="POST" enctype="multipart/form-data">

                <div class="mb-3">
                    <label class="form-label">Product Name</label>
                    <input type="text" class="form-control" placeholder="Enter Product Name" name="name">
                </div>
                 <div class="mb-3">
                    <label class="form-label">Product Category</label>
                    <select name="category" id="category" class="form-control">
                        <option value="0">---Select Category---</option>
                       {% for cat in categories %}
                        <option value="{{cat.id}}" {%if cat.id==product.category.id%}selected {%endif%}> {{cat.name}}</option>
                        {% endfor %}
                      
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Price</label>
                    <input type="number" class="form-control" placeholder="Enter Product Price" name="price">
                </div>

                <div class="mb-3">
                    <label class="form-label">Quantity</label>
                    <input type="number" class="form-control" placeholder="Enter Quantity" name="quantity">
                </div>

                <div class="mb-4">
                    <label class="form-label">Product Image</label>
                    <input type="file" class="form-control" name="image">
                </div>

                <div class="d-flex gap-3">

                    <button type="submit" class="btn btn-success btn-custom">
                        Save Product
                    </button>

                    <a href="{%url 'product_list' %}" class="btn btn-primary btn-custom">
                        View Products
                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

</body>
</html>
