<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f7fa;
        }

        .form-card{
            max-width:700px;
            margin:50px auto;
            border:none;
            border-radius:15px;
            box-shadow:0 5px 20px rgba(0,0,0,0.1);
        }

        .card-header{
            background:#0d6efd;
            color:white;
            text-align:center;
            font-size:24px;
            font-weight:600;
            padding:20px;
            border-radius:15px 15px 0 0;
        }

        .btn-custom{
            min-width:150px;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="card form-card">

        <div class="card-header">
            {% if product %}Edit Product{% else %}Add New Product{% endif %}
        </div>

        <div class="card-body p-4">
            <span class="text-success">{{msg}}</span>
            <form method="POST" enctype="multipart/form-data">

                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Product Name</label>
                    <input type="text" class="form-control" placeholder="Enter Product Name" name="name" value="{{ product.name|default:'' }}">
                </div>
                 <div class="mb-3">
                    <label class="form-label">Product Category</label>
                    <select name="category" id="category" class="form-control">
                        <option value="0">---Select Category---</option>
                        {% for category in categories %}
                        <option value="{{ category.id }}" {% if product.category.id == category.id %}selected{% endif %}>{{ category.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Price</label>
                    <input type="number" step="any" class="form-control" placeholder="Enter Product Price" name="price" value="{{ product.price|default:'' }}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Quantity</label>
                    <input type="number" class="form-control" placeholder="Enter Quantity" name="quantity" value="{{ product.qty|default:'' }}">
                </div>

                <div class="mb-4">
                    <label class="form-label">Product Image</label>
                    {% if product.image %}
                        <div class="mb-2">
                            <img src="{{ product.image.url }}" class="img-thumbnail" style="max-height: 100px;">
                            <small class="text-muted d-block">Current image: {{ product.image.name }}</small>
                        </div>
                    {% endif %}
                    <input type="file" class="form-control" name="image">
                </div>

                <div class="d-flex gap-3">

                    <button type="submit" class="btn btn-success btn-custom">
                        {% if product %}Update Product{% else %}Save Product{% endif %}
                    </button>

                    <a href="{%url 'product_list'%}" class="btn btn-primary btn-custom">
                        View Products
                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

</body>
</html>
