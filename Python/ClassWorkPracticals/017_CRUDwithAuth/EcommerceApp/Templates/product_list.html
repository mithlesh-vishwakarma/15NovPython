<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product List</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f5f7fa;
        }

        .table-card{
            margin-top:50px;
            border:none;
            border-radius:15px;
            box-shadow:0 5px 20px rgba(0,0,0,0.1);
        }

        .card-header{
            background:#0d6efd;
            color:white;
            font-size:22px;
            font-weight:600;
            padding:20px;
        }

        .product-image{
            width:80px;
            height:80px;
            object-fit:cover;
            border-radius:10px;
            border:1px solid #ddd;
        }

        .btn-action{
            min-width:20px;
        }

    </style>

</head>
<body>

<div class="container">

    <div class="card table-card">

        <div class="card-header d-flex align-items-center">

            <h4 class="mb-0">Product Management </h4>
           
           
            <a href="{%url 'logout'%}" class="btn btn-danger m-4" gap="2px">
                Log Out
            </a>


            <a href="{%url 'product_form'%}" class="btn btn-light">
                + Add New Product
            </a>
            
        </div>

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-bordered table-hover align-middle">

                    <thead class="table-dark">

                    <tr>
                        <th>ID</th>
                        <th>Image</th>
                        <th>Product Name</th>
                        <th>Price</th>
                        <th>Quantity</th>
                        <th width="180">Actions</th>
                    </tr>

                    </thead>

                    <tbody>

                    <tr>
                        <td>1</td>

                        <td>
                            <img src="https://via.placeholder.com/80"
                                 class="product-image">
                        </td>

                        <td>T-Shirt</td>

                        <td>₹499</td>

                        <td>25</td>

                        <td>
    <div class="d-flex gap-2">

        <a href="#" class="btn btn-warning btn-sm">
            <i class="bi bi-pencil-square"></i> Edit
        </a>

        <a href="#" class="btn btn-danger btn-sm">
            <i class="bi bi-trash"></i> Delete
        </a>

    </div>
</td>
                    </tr>

                    <tr>
                        <td>2</td>

                        <td>
                            <img src="https://via.placeholder.com/80"
                                 class="product-image">
                        </td>

                        <td>Track Pant</td>

                        <td>₹799</td>

                        <td>15</td>

                        <td>
    <div class="d-flex gap-2">

        <a href="#" class="btn btn-warning btn-sm">
            <i class="bi bi-pencil-square"></i> Edit
        </a>

        <a href="#" class="btn btn-danger btn-sm">
            <i class="bi bi-trash"></i> Delete
        </a>

    </div>
</td>
                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

</body>
</html>
