<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session 3</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
        }

        nav {
            background-color: #f5f5f5;
            padding: 15px 30px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        nav a {
            text-decoration: none;
            color: #333;
            font-weight: bold;
        }

        nav a:hover {
            color: #007bff;
        }

        main {
            min-height: 80vh;
            padding: 20px;
        }

        footer {
            background-color: #f5f5f5;
            text-align: center;
            padding: 15px;
        }
    </style>

</head>
<body>

    <header>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Explore</a></li>
                <li><a href="#">Profile</a></li>
            </ul>
        </nav>
    </header>

    <main>
      {% block content %}
        
        {% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 My Website. All Rights Reserved.</p>
    </footer>

</body>
</html>
