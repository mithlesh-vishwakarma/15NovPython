<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>View Products</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: #f4f7fc;
      }

      .card {
        border: none;
        border-radius: 15px;
      }

      .product-img {
        width: 80px;
        height: 80px;
        object-fit: cover;
        border-radius: 10px;
        border: 2px solid #dee2e6;
      }

      .table th {
        background-color: #0d6efd;
        color: white;
        text-align: center;
      }

      .table td {
        vertical-align: middle;
        text-align: center;
      }

      .heading {
        font-weight: bold;
        color: #0d6efd;
      }

      .btn-action {
        margin: 2px;
      }

      .table-hover tbody tr:hover {
        background-color: #f1f5ff;
      }
    </style>
  </head>
  <body>
    <div class="container mt-5">
      <div class="card shadow-lg">
        <div
          class="card-header bg-primary text-white d-flex justify-content-between align-items-center"
        >
          <h3 class="mb-0">Product List</h3>

          <a href="/" class="btn btn-light"> + Add Product </a>
        </div>

        <div class="card-body">
          <div class="table-responsive">
            <table class="table table-bordered table-hover align-middle">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Image</th>
                  <th>Product Name</th>
                  <th>Price (₹)</th>
                  <th>Quantity</th>
                  <th>Actions</th>
                </tr>
              </thead>

              <tbody>
                {% for product in products %}

                <tr>
                  <td>{{ product.id }}</td>

                  <td>
                    <img
                      src="{{ product.image.url }}"
                      alt="
                                     {{product.image}}"
                      width="80"
                      height="80"
                    />
                  </td>

                  <td>
                    <strong>{{ product.name }}</strong>
                  </td>

                  <td>₹ {{ product.price }}</td>

                  <td>
                    <span class="badge bg-success fs-6">
                      {{ product.qty }}
                    </span>
                  </td>

                  <td>
                    <a href="{%url 'update'%}?id={{product.id}}" class="btn btn-warning btn-sm btn-action">
                      Edit
                    </a>

                    <a href="{%url 'delete'%}?id={{product.id}}" class="btn btn-danger btn-sm btn-action">
                      Delete
                    </a>

                  </td>
                </tr>

                {% empty %}

                <tr>
                  <td colspan="6" class="text-center text-danger">
                    No Products Available
                  </td>
                </tr>

                {% endfor %}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
